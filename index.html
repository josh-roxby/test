<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" />
    <title>Tempo — habits & mood</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <button id="gear" aria-label="Settings" type="button">⚙</button>

    <main id="app" aria-live="polite"></main>

    <nav id="tabbar" hidden>
      <button data-route="diary" class="tab" aria-label="Diary">
        <span class="tab-icon">📖</span><span class="tab-label">Diary</span>
      </button>
      <button data-route="habits" class="tab" aria-label="Habits">
        <span class="tab-icon">✓</span><span class="tab-label">Habits</span>
      </button>
      <button data-route="home" class="tab" aria-label="Today">
        <span class="tab-icon">◐</span><span class="tab-label">Today</span>
      </button>
      <button data-route="countdowns" class="tab" aria-label="Countdowns">
        <span class="tab-icon">⏳</span><span class="tab-label">Soon</span>
      </button>
      <button data-route="reports" class="tab" aria-label="Reports">
        <span class="tab-icon">📊</span><span class="tab-label">Reports</span>
      </button>
    </nav>

    <script type="module" src="./app.js"></script>
  </body>
</html>
